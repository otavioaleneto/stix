<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NOVA</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div id="app">
        <div id="loading-overlay" class="overlay">
            <div class="loader-container">
                <img src="img/logo.nova.png" alt="Nova" class="loader-logo">
                <div class="loader-spinner"></div>
                <p class="loader-text">Connecting to console...</p>
            </div>
        </div>

        <div id="login-screen" class="login-screen hidden">
            <div class="login-container">
                <img src="img/logo.nova.png" alt="Nova" class="login-logo">
                <h1 class="login-title">NOVA</h1>
                <p class="login-subtitle">Xbox 360 Dashboard</p>
                <form id="login-form" class="login-form">
                    <div class="login-field">
                        <label for="login-username">Username</label>
                        <input type="text" id="login-username" autocomplete="username" autocapitalize="off" placeholder="Username">
                    </div>
                    <div class="login-field">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" autocomplete="current-password" placeholder="Password">
                    </div>
                    <label class="login-remember" for="login-remember">
                        <input type="checkbox" id="login-remember">
                        <span>Lembrar de mim</span>
                    </label>
                    <p id="login-error" class="login-error hidden"></p>
                    <button type="submit" class="btn btn-primary btn-block login-btn" id="login-submit">
                        <span id="login-btn-text">Login</span>
                        <div id="login-btn-spinner" class="loader-spinner small hidden"></div>
                    </button>
                </form>
            </div>
        </div>

        <main id="main-content" class="main-content hidden">
            <div id="page-home" class="page active"></div>
            <div id="page-games" class="page"></div>
            <div id="page-profile" class="page"></div>
            <div id="page-rooms" class="page"></div>
            <div id="page-screens" class="page"></div>
            <div id="page-files" class="page"></div>
            <div id="page-settings" class="page"></div>
        </main>

        <nav id="bottom-nav" class="bottom-nav hidden">
            <button class="nav-item active" data-page="home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>Home</span>
            </button>
            <button class="nav-item" data-page="games">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><circle cx="16" cy="10" r="1"/><circle cx="18" cy="12" r="1"/></svg>
                <span>Games</span>
            </button>
            <button class="nav-item nav-item-perfil" data-page="profile" id="nav-perfil-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span>Perfil</span>
            </button>
            <button class="nav-item" data-page="screens">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                <span>Screens</span>
            </button>
            <button class="nav-item" data-page="files">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                <span>Files</span>
            </button>
            <button class="nav-item" data-page="settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <span>Settings</span>
            </button>
        </nav>
    </div>

    <div id="sidebar-overlay" class="sidebar-overlay hidden"></div>
    <div id="sidebar" class="sidebar hidden">
        <div class="sidebar-header">
            <img src="img/icon.nova.png" alt="Nova" class="sidebar-logo">
            <span class="sidebar-title">NOVA</span>
            <button id="sidebar-close" class="sidebar-close">&times;</button>
        </div>
        <div class="sidebar-content">
            <a class="sidebar-link" data-page="home">Home</a>
            <a class="sidebar-link" data-page="games">Games Library</a>
            <a class="sidebar-link" data-page="profile">Meu Perfil</a>
            <a class="sidebar-link" data-page="rooms">Salas</a>
            <a class="sidebar-link" data-page="screens">Screenshots</a>
            <a class="sidebar-link" data-page="files">File Manager</a>
            <a class="sidebar-link" data-page="settings">Settings</a>
        </div>
    </div>

    <div id="image-viewer" class="image-viewer hidden">
        <div class="image-viewer-backdrop"></div>
        <div class="image-viewer-content">
            <img id="viewer-image" src="" alt="">
            <div class="image-viewer-actions">
                <a id="viewer-download" href="" download class="viewer-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Download
                </a>
                <button id="viewer-close" class="viewer-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    Close
                </button>
            </div>
        </div>
    </div>

    <script src="js/cms-config.js"></script>
    <script src="js/nova-api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
